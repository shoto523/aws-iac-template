AWSTemplateFormatVersion: "2010-09-09"
Description: "aws-app: ECS Cluster + Task Definition + Service"

Parameters:
  ProjectName:
    Type: String
  PrivateSubnetIds:
    Type: CommaDelimitedList
  EcsSecurityGroupId:
    Type: String
  ContainerName:
    Type: String
  ContainerPort:
    Type: Number
    Default: 80
  EcrRepositoryUrl:
    Type: String
  EcsTaskExecutionRoleArn:
    Type: String
  EcsTaskRoleArn:
    Type: String
  TargetGroupBlueArn:
    Type: String

Resources:
  # ----------------------------------------
  # CloudWatch Logs
  # ----------------------------------------
  EcsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${ProjectName}"
      RetentionInDays: 30

  # ----------------------------------------
  # ECS Cluster
  # ----------------------------------------
  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${ProjectName}-cluster"
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # ----------------------------------------
  # ECS Task Definition
  # ----------------------------------------
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Ref ProjectName
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: "256"
      Memory: "512"
      ExecutionRoleArn: !Ref EcsTaskExecutionRoleArn
      TaskRoleArn: !Ref EcsTaskRoleArn
      ContainerDefinitions:
        - Name: !Ref ContainerName
          Image: !Sub "${EcrRepositoryUrl}:latest"
          Essential: true
          PortMappings:
            - ContainerPort: !Ref ContainerPort
              Protocol: tcp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref EcsLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # ----------------------------------------
  # ECS Service
  # ----------------------------------------
  EcsService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${ProjectName}-service"
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      DeploymentController:
        Type: CODE_DEPLOY
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets: !Ref PrivateSubnetIds
          SecurityGroups:
            - !Ref EcsSecurityGroupId
          AssignPublicIp: DISABLED
      LoadBalancers:
        - ContainerName: !Ref ContainerName
          ContainerPort: !Ref ContainerPort
          TargetGroupArn: !Ref TargetGroupBlueArn
      Tags:
        - Key: Project
          Value: !Ref ProjectName

Outputs:
  EcsClusterName:
    Value: !Ref EcsCluster
    Export:
      Name: !Sub "${ProjectName}-cluster-name"

  EcsServiceName:
    Value: !GetAtt EcsService.Name
    Export:
      Name: !Sub "${ProjectName}-service-name"
